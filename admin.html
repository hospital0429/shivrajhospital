<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shivraj Hospital Admin Panel</title>

<link 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;

}



body{

background:#eef4fb;

}


/* =====================
LOGIN
===================== */


#loginModal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.6);

display:flex;

align-items:center;

justify-content:center;

z-index:9999;

}



.login-box{

width:350px;

background:white;

padding:30px;

border-radius:12px;

text-align:center;

}



.login-box h2{

color:#0d6efd;

margin-bottom:20px;

}



.login-box input{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:8px;

}



.login-box button{

width:100%;

padding:12px;

background:#0d6efd;

border:none;

color:white;

border-radius:8px;

font-size:16px;

cursor:pointer;

}





/* =====================
SIDEBAR
===================== */


.sidebar{

position:fixed;

top:0;

left:0;

height:100vh;

width:250px;

background:#0d6efd;

color:white;

}



.logo{

padding:25px;

text-align:center;

font-size:22px;

font-weight:bold;

border-bottom:1px solid rgba(255,255,255,.3);

}



.logo i{

font-size:40px;

display:block;

margin-bottom:10px;

}



.menu{

padding:15px;

}



.menu a{

display:block;

color:white;

text-decoration:none;

padding:12px;

margin-bottom:8px;

border-radius:8px;

cursor:pointer;

}



.menu a:hover{

background:rgba(255,255,255,.2);

}



.menu i{

width:25px;

}




/* =====================
MAIN
===================== */


.main{

margin-left:250px;

}



.header{

height:75px;

background:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 30px;

box-shadow:0 2px 10px #ddd;

}



.header h2{

color:#0d6efd;

}



.admin{

display:flex;

align-items:center;

gap:10px;

}



.admin img{

width:45px;

height:45px;

border-radius:50%;

}




.container{

padding:25px;

}




/* =====================
CARDS
===================== */


.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:20px;

}



.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}



.card i{

font-size:30px;

color:#0d6efd;

}



.card h4{

color:#666;

margin-top:10px;

}



.card h2{

color:#0d6efd;

margin-top:8px;

}




/* =====================
SECTION
===================== */


.section{

background:white;

padding:25px;

margin-top:25px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}



.section h3{

color:#0d6efd;

margin-bottom:20px;

}



.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

}



.form-grid input,
.form-grid select{

padding:12px;

border:1px solid #ccc;

border-radius:8px;

}



.saveBtn{

margin-top:20px;

padding:12px 30px;

background:#198754;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}





@media(max-width:900px){


.sidebar{

width:70px;

}


.logo span,
.menu span{

display:none;

}


.main{

margin-left:70px;

}


}



</style>

</head>



<body>


<!-- LOGIN -->


<div id="loginModal">


<div class="login-box">


<h2>
🏥 Admin Login
</h2>


<input 
id="username"
placeholder="Username">


<input 
id="password"
type="password"
placeholder="Password">



<button onclick="login()">

Login

</button>


</div>


</div>






<!-- SIDEBAR -->


<div class="sidebar">


<div class="logo">

<i class="fas fa-hospital"></i>

<span>
Shivraj Hospital
</span>

</div>



<div class="menu">


<a onclick="openSection('Dashboard')">
<i class="fas fa-chart-line"></i>
<span>Dashboard</span>
</a>



<a onclick="openSection('Doctors')">
<i class="fas fa-user-doctor"></i>
<span>Doctors</span>
</a>



<a onclick="openSection('Indoor')">
<i class="fas fa-bed"></i>
<span>Indoor</span>
</a>



<a onclick="openSection('Emergency')">
<i class="fas fa-truck-medical"></i>
<span>Emergency</span>
</a>



<a onclick="openSection('Laboratory')">
<i class="fas fa-flask"></i>
<span>Laboratory</span>
</a>



<a onclick="openSection('XRay')">
<i class="fas fa-x-ray"></i>
<span>X-Ray</span>
</a>



<a onclick="openSection('OPD')">
<i class="fas fa-stethoscope"></i>
<span>OPD</span>
</a>



<a onclick="openSection('ANC')">
<i class="fas fa-notes-medical"></i>
<span>ANC</span>
</a>



<a onclick="openSection('Notices')">
<i class="fas fa-bullhorn"></i>
<span>Notices</span>
</a>



<a onclick="openSection('DutyRoster')">
<i class="fas fa-calendar"></i>
<span>Duty Roster</span>
</a>



</div>

</div>






<!-- MAIN -->


<div class="main">


<div class="header">


<h2>
Shivraj Hospital Admin Dashboard
</h2>


<div class="admin">

<img src="https://ui-avatars.com/api/?name=Admin">

<strong>
Administrator
</strong>

</div>


</div>



<div class="container">


<div class="cards">


<div class="card">
<i class="fas fa-user-doctor"></i>
<h4>OPD</h4>
<h2>0</h2>
</div>


<div class="card">
<i class="fas fa-truck-medical"></i>
<h4>Emergency</h4>
<h2>0</h2>
</div>


<div class="card">
<i class="fas fa-bed"></i>
<h4>Indoor</h4>
<h2>0</h2>
</div>


<div class="card">
<i class="fas fa-flask"></i>
<h4>Lab</h4>
<h2>0</h2>
</div>


<div class="card">
<i class="fas fa-x-ray"></i>
<h4>X-Ray</h4>
<h2>0</h2>
</div>


<div class="card">
<i class="fas fa-pills"></i>
<h4>Pharmacy</h4>
<h2>0</h2>
</div>



</div>



<div id="dynamicSection"></div>
<!-- ==========================
DYNAMIC FORMS
========================== -->


<script type="text/template" id="Dashboard">

<div class="section">

<h3>
<i class="fas fa-chart-line"></i>
Dashboard Overview
</h3>


<p>
Welcome to Shivraj Hospital Admin Panel
</p>


</div>

</script>





<script type="text/template" id="Doctors">


<div class="section">


<h3>
<i class="fas fa-user-doctor"></i>
Doctor Entry
</h3>



<div class="form-grid">


<input id="doctorName" placeholder="Doctor Name">


<input id="doctorDepartment" placeholder="Department">


<input id="doctorQualification" placeholder="Qualification">


<input id="doctorPhone" placeholder="Phone Number">


<input id="doctorPhoto" placeholder="Photo URL">


</div>



<button class="saveBtn" onclick="saveModule('Doctors')">

Save Doctor

</button>


</div>


</script>







<script type="text/template" id="Indoor">


<div class="section">


<h3>
<i class="fas fa-bed"></i>
Indoor Service
</h3>


<div class="form-grid">


<input id="admitted" placeholder="Total Admitted">


<input id="discharged" placeholder="Total Discharged">


<input id="maleIndoor" placeholder="Male Patients">


<input id="femaleIndoor" placeholder="Female Patients">


<input id="bedOccupancy" placeholder="Bed Occupancy %">


</div>


<button class="saveBtn" onclick="saveModule('Indoor')">

Save Indoor Data

</button>


</div>


</script>







<script type="text/template" id="Emergency">


<div class="section">


<h3>
<i class="fas fa-truck-medical"></i>
Emergency Data
</h3>



<div class="form-grid">


<input id="erTotal" placeholder="Total Emergency">


<input id="red" placeholder="Red Category">


<input id="yellow" placeholder="Yellow Category">


<input id="green" placeholder="Green Category">


</div>



<button class="saveBtn" onclick="saveModule('Emergency')">

Save Emergency

</button>


</div>



</script>









<script type="text/template" id="Laboratory">


<div class="section">


<h3>
<i class="fas fa-flask"></i>
Laboratory

</h3>



<div class="form-grid">


<input id="labTotal" placeholder="Total Lab">


<input id="bloodTest" placeholder="Blood Test">


<input id="urineTest" placeholder="Urine Test">


<input id="otherTest" placeholder="Other Test">


</div>



<button class="saveBtn" onclick="saveModule('Laboratory')">

Save Laboratory

</button>


</div>


</script>









<script type="text/template" id="XRay">


<div class="section">


<h3>
<i class="fas fa-x-ray"></i>

X-Ray

</h3>



<div class="form-grid">


<input id="xrayTotal" placeholder="Total X-Ray">


<input id="usgTotal" placeholder="USG">


<input id="ecgTotal" placeholder="ECG">


</div>


<button class="saveBtn" onclick="saveModule('XRay')">

Save X-Ray

</button>


</div>


</script>









<script type="text/template" id="OPD">


<div class="section">


<h3>
<i class="fas fa-stethoscope"></i>

OPD Data

</h3>



<div class="form-grid">


<input id="opdMale" placeholder="Male OPD">


<input id="opdFemale" placeholder="Female OPD">


<input id="consultant" placeholder="Consultant OPD">


<input id="specialist" placeholder="Specialist Service">


</div>



<button class="saveBtn" onclick="saveModule('OPD')">

Save OPD

</button>


</div>


</script>









<script type="text/template" id="ANC">


<div class="section">


<h3>
<i class="fas fa-notes-medical"></i>

ANC Service

</h3>



<div class="form-grid">


<input id="ancVisit" placeholder="ANC Visit">


<input id="ancNew" placeholder="New ANC">


<input id="delivery" placeholder="Delivery">


</div>



<button class="saveBtn" onclick="saveModule('ANC')">

Save ANC

</button>


</div>


</script>









<script type="text/template" id="Notices">


<div class="section">


<h3>
<i class="fas fa-bullhorn"></i>

Notice Management

</h3>



<div class="form-grid">


<input id="noticeTitle" placeholder="Notice Title">


<input id="noticeLink" placeholder="PDF/Image Link">


</div>



<button class="saveBtn" onclick="saveModule('Notices')">

Save Notice

</button>


</div>


</script>









<script type="text/template" id="DutyRoster">


<div class="section">


<h3>
<i class="fas fa-calendar"></i>

Duty Roster

</h3>



<div class="form-grid">


<input id="dutyDate" placeholder="Date">


<input id="morning" placeholder="Morning Duty">


<input id="evening" placeholder="Evening Duty">


<input id="night" placeholder="Night Duty">


</div>



<button class="saveBtn" onclick="saveModule('DutyRoster')">

Save Duty Roster

</button>


</div>


</script>
<script>


// =============================
// GOOGLE SHEET API
// =============================


const API = "https://script.google.com/macros/s/AKfycbwk948_IUZbu1dLZ6WXjvXbRizguW-2dLGRzuYzr5fuxEwGh2mFDXEs-Nd-c_OQ0d6Z/exec";





// =============================
// LOGIN
// =============================


function login(){


let user =
document.getElementById("username").value;


let pass =
document.getElementById("password").value;



if(user==="admin" && pass==="12345"){


document.getElementById("loginModal").style.display="none";


alert("✅ Login Successful");


}

else{


alert("❌ Invalid Username or Password");


}


}






// =============================
// OPEN SECTION
// =============================


window.openSection=function(section){



let box =
document.getElementById("dynamicSection");



let template =
document.getElementById(section);



if(template){


box.innerHTML =
template.innerHTML;


}

else{


box.innerHTML=
`

<div class="section">

<h3>
${section}
</h3>

</div>

`;

}


};









// =============================
// SAVE MODULE DATA
// =============================


async function saveModule(sheetName){



let values=[];



let inputs =
document.querySelectorAll("#dynamicSection input");



inputs.forEach(function(input){


values.push(input.value);


});





console.log(
"Saving:",
sheetName,
values
);





try{


let response =
await fetch(API,{


method:"POST",


redirect:"follow",


headers:{


"Content-Type":
"text/plain;charset=utf-8"


},


body:JSON.stringify({


sheet:sheetName,


values:values


})


});





let result =
await response.text();



console.log(
"Server:",
result
);



alert(
"✅ "+sheetName+" Saved Successfully"
);



}



catch(error){


console.error(error);


alert(
"❌ Save Failed : "+
error.message
);


}



}





</script>
</script>


</div>

</div>


</body>

</html>
