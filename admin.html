<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shivraj Hospital Admin Panel</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#eef4fb;
overflow-x:hidden;
}

/*=====================
 SIDEBAR
======================*/

.sidebar{

position:fixed;
left:0;
top:0;

width:250px;
height:100vh;

background:#0d6efd;
color:#fff;

}

.logo{

padding:25px;
text-align:center;
font-size:24px;
font-weight:bold;

border-bottom:1px solid rgba(255,255,255,.2);

}

.logo i{

font-size:40px;
margin-bottom:10px;
display:block;

}

.menu{

padding:15px;

}

.menu a{

display:block;

color:white;

text-decoration:none;

padding:12px;

margin-bottom:8px;

border-radius:8px;

transition:.3s;

}

.menu a:hover{

background:rgba(255,255,255,.18);

}

.menu i{

width:25px;

}

/*=====================
 MAIN
======================*/

.main{

margin-left:250px;

min-height:100vh;

}

/*=====================
 HEADER
======================*/

.header{

background:white;

padding:18px 25px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.header h2{

color:#0d6efd;

}

.admin{

display:flex;

align-items:center;

gap:12px;

}

.admin img{

width:45px;
height:45px;

border-radius:50%;

}

/*=====================
 DASHBOARD
======================*/

.container{

padding:25px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card i{

font-size:30px;

color:#0d6efd;

margin-bottom:10px;

}

.card h4{

color:#666;

margin-bottom:8px;

}

.card h2{

color:#0d6efd;

}

/*=====================
 DATA ENTRY
======================*/

.section{

margin-top:30px;

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.section h3{

margin-bottom:20px;

color:#0d6efd;

}

.form-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

}

.form-grid input{

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:15px;

outline:none;

}

.form-grid input:focus{

border-color:#0d6efd;

}

.saveBtn{

margin-top:20px;

padding:13px 28px;

background:#198754;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

.saveBtn:hover{

background:#157347;

}

/*=====================
 MOBILE
======================*/

@media(max-width:900px){

.sidebar{

width:70px;

}

.sidebar .text{

display:none;

}

.main{

margin-left:70px;

}

.logo{

font-size:18px;

padding:20px 10px;

}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<i class="fas fa-hospital"></i>

<span class="text">Shivraj Hospital</span>

</div>

<div class="menu">

<a href="#"><i class="fas fa-chart-line"></i> <span class="text">Dashboard</span></a>

<a href="#"><i class="fas fa-user-doctor"></i> <span class="text">Doctors</span></a>

<a href="#"><i class="fas fa-bed"></i> <span class="text">Indoor</span></a>

<a href="#"><i class="fas fa-truck-medical"></i> <span class="text">Emergency</span></a>

<a href="#"><i class="fas fa-flask"></i> <span class="text">Laboratory</span></a>

<a href="#"><i class="fas fa-x-ray"></i> <span class="text">X-Ray</span></a>

<a href="#"><i class="fas fa-stethoscope"></i> <span class="text">OPD</span></a>

<a href="#"><i class="fas fa-notes-medical"></i> <span class="text">ANC</span></a>

<a href="#"><i class="fas fa-image"></i> <span class="text">Gallery</span></a>

<a href="#"><i class="fas fa-bullhorn"></i> <span class="text">Notices</span></a>

<a href="#"><i class="fas fa-calendar"></i> <span class="text">Duty Roster</span></a>

<a href="#"><i class="fas fa-gear"></i> <span class="text">Settings</span></a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h2>Hospital Management Dashboard</h2>

<div class="admin">

<img src="https://ui-avatars.com/api/?name=Admin" alt="Admin">

<strong>Administrator</strong>

</div>

</div>

<div class="container">

<div class="cards">

<div class="card">

<i class="fas fa-user-doctor"></i>

<h4>Today's OPD</h4>

<h2 id="opdCard">0</h2>

</div>

<div class="card">

<i class="fas fa-truck-medical"></i>

<h4>Emergency</h4>

<h2 id="erCard">0</h2>

</div>

<div class="card">

<i class="fas fa-flask"></i>

<h4>Laboratory</h4>

<h2 id="labCard">0</h2>

</div>

<div class="card">

<i class="fas fa-x-ray"></i>

<h4>X-Ray</h4>

<h2 id="xrayCard">0</h2>

</div>

<div class="card">

<i class="fas fa-heart-pulse"></i>

<h4>ECG</h4>

<h2 id="ecgCard">0</h2>

</div>

<div class="card">

<i class="fas fa-pills"></i>

<h4>Pharmacy</h4>

<h2 id="pharmacyCard">0</h2>

</div>

</div>

<div class="section">

<h3>Daily Statistics Entry</h3>

<div class="form-grid">

<input type="date" id="date">

<input type="number" id="opdMale" placeholder="OPD Male">

<input type="number" id="opdFemale" placeholder="OPD Female">

<input type="number" id="er" placeholder="Emergency">

<input type="number" id="lab" placeholder="Laboratory">

<input type="number" id="xray" placeholder="X-Ray">

<input type="number" id="usg" placeholder="USG">

<input type="number" id="ecg" placeholder="ECG">

<input type="number" id="pharmacy" placeholder="Pharmacy">

<input type="number" id="admitted" placeholder="Admitted">

<input type="number" id="discharged" placeholder="Discharged">

<input type="number" id="beds" placeholder="Total Beds">

</div>

<button class="saveBtn" id="saveBtn">
<i class="fas fa-save"></i>
 Save Data
</button>

</div>

</div>

</div>
<!-- ===========================
LOGIN MODAL
=========================== -->

<div id="loginModal" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;">

<div style="
width:350px;
background:#fff;
padding:30px;
border-radius:12px;
text-align:center;">

<h2 style="color:#0d6efd;">🏥 Admin Login</h2>

<input
type="text"
id="username"
placeholder="Username"
style="
width:100%;
padding:12px;
margin-top:20px;
border:1px solid #ccc;
border-radius:8px;">

<input
type="password"
id="password"
placeholder="Password"
style="
width:100%;
padding:12px;
margin-top:15px;
border:1px solid #ccc;
border-radius:8px;">

<button
onclick="login()"
style="
width:100%;
padding:12px;
margin-top:20px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;">

Login

</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyqDnLjXSo3XLdRJDibkK5BdyvCnoz1djt_RrzxqUPNY90D5bneH_8UcpB803FRTi31/exec
/* ======================
TODAY DATE
====================== */

document.getElementById("date").value=
new Date().toISOString().split("T")[0];


/* ======================
LOGIN
====================== */

function login(){

let u=document.getElementById("username").value;

let p=document.getElementById("password").value;

if(u==="admin" && p==="shivraj@123"){

document.getElementById("loginModal").style.display="none";

}else{

alert("Wrong Username or Password");

}

}


/* ======================
SAVE DATA
====================== */

async function saveData() {

  const values = [
    document.getElementById("date").value,
    document.getElementById("opdMale").value,
    document.getElementById("opdFemale").value,
    document.getElementById("er").value,
    document.getElementById("lab").value,
    document.getElementById("pharmacy").value,
    document.getElementById("ecg").value,
    document.getElementById("usg").value,
    document.getElementById("xray").value,
    document.getElementById("admitted").value,
    document.getElementById("discharged").value,
    document.getElementById("beds").value
  ];

  try {

    console.log("API URL:", API);
console.log("DATA:", values);

const response = await fetch(API, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    sheet: "Dashboard",
    values: values
  })
});

    const text = await response.text();

    console.log("Status:", response.status);
    console.log("Response:", text);

    if (!response.ok) {
      throw new Error(text);
    }

    alert("✅ Data Saved Successfully");

  } catch (error) {

    console.error(error);
    alert("Error: " + error.message);

  }

}


/* ======================
BUTTON
====================== */

document
.getElementById("saveBtn")
.addEventListener("click",saveData);

</script>

</body>

</html>
