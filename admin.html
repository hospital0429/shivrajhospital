<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivraj Hospital Admin Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef5ff;
}

/* LOGIN */

#loginPage{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login-box{

width:380px;

background:#fff;

padding:35px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.login-box h2{

text-align:center;

color:#0d6efd;

margin-bottom:25px;

}

.login-box input{

width:100%;

padding:12px;

margin-bottom:15px;

border:1px solid #ccc;

border-radius:8px;

font-size:15px;

}

.login-box button{

width:100%;

padding:12px;

background:#0d6efd;

color:#fff;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

.login-box button:hover{

background:#0a58ca;

}

/* DASHBOARD */

#dashboard{

display:none;

}

.header{

background:#0d6efd;

color:white;

padding:15px 25px;

display:flex;

justify-content:space-between;

align-items:center;

}

.header h2{

font-size:22px;

}

.logout{

background:red;

color:white;

border:none;

padding:8px 15px;

border-radius:6px;

cursor:pointer;

}

.container{

padding:25px;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:15px;

margin-bottom:30px;

}

.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 3px 10px rgba(0,0,0,.1);

text-align:center;

}

.card h3{

font-size:16px;

margin-bottom:10px;

color:#444;

}

.card h1{

color:#0d6efd;

}

.section{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 3px 10px rgba(0,0,0,.1);

margin-top:20px;

}

.section h2{

margin-bottom:20px;

color:#0d6efd;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

}

.grid input{

padding:10px;

border:1px solid #ccc;

border-radius:8px;

}

.saveBtn{

margin-top:20px;

padding:12px 25px;

background:#198754;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

.saveBtn:hover{

background:#157347;

}

@media(max-width:700px){

.header{

flex-direction:column;

gap:10px;

}

}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h2>🏥 Shivraj Hospital</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="header">

<h2>🏥 Shivraj Hospital Admin Dashboard</h2>

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="container">

<div class="cards">

<div class="card">
<h3>Today's OPD</h3>
<h1 id="cardOPD">0</h1>
</div>

<div class="card">
<h3>Emergency</h3>
<h1 id="cardER">0</h1>
</div>

<div class="card">
<h3>Laboratory</h3>
<h1 id="cardLab">0</h1>
</div>

<div class="card">
<h3>Pharmacy</h3>
<h1 id="cardPharmacy">0</h1>
</div>

<div class="card">
<h3>X-Ray</h3>
<h1 id="cardXray">0</h1>
</div>

<div class="card">
<h3>USG</h3>
<h1 id="cardUSG">0</h1>
</div>

</div>

<div class="section">

<h2>Daily Hospital Data Entry</h2>

<div class="grid">

<input type="date" id="date">

<input type="number" id="opdMale" placeholder="OPD Male">

<input type="number" id="opdFemale" placeholder="OPD Female">

<input type="number" id="er" placeholder="Emergency">

<input type="number" id="lab" placeholder="Laboratory">

<input type="number" id="pharmacy" placeholder="Pharmacy">

<input type="number" id="ecg" placeholder="ECG">

<input type="number" id="usg" placeholder="USG">

<input type="number" id="xray" placeholder="X-Ray">

<input type="number" id="admitted" placeholder="Admitted">

<input type="number" id="discharged" placeholder="Discharged">

<input type="number" id="beds" placeholder="Total Beds">

</div>

<button class="saveBtn" onclick="saveData()">
💾 Save Data
</button>

</div>

</div>

</div>

<script>

function login(){

let u=document.getElementById("username").value;

let p=document.getElementById("password").value;

if(u==="admin" && p==="shivraj@123"){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

}else{

alert("Invalid Username or Password");

}

}

function logout(){

location.reload();

}

</script>

</body>
</html>
